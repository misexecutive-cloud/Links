<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Mobile Viewport Settings to ensure 100% full screen expansion -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Shilpam Art & Craft</title>
  
  <!-- Font Awesome CDN (Required for Icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body, html {
      width: 100%;
      height: 100%;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #ffffff;
      color: #222222;
    }
    .full-container {
      width: 100%;
      min-height: 100vh;
      padding: 40px 20px 30px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      background: linear-gradient(180deg, #ffffff 0%, #f4f6f9 100%);
    }
    .brand-icon {
      width: 85px;
      height: 85px;
      background: linear-gradient(135deg, #E1306C, #FF0000);
      color: #ffffff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      box-shadow: 0 8px 20px rgba(225,48,108,0.3);
      margin-bottom: 16px;
    }
    .brand-title {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      text-align: center;
      color: #111111;
      margin-bottom: 6px;
    }
    .brand-subtitle {
      font-size: 0.95rem;
      color: #666666;
      text-align: center;
      margin-bottom: 32px;
    }
    .social-row {
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 35px;
    }
    .social-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #ffffff;
      text-decoration: none;
      transition: transform 0.2s;
    }
    .insta { background-color: #E1306C; box-shadow: 0 6px 16px rgba(225, 48, 108, 0.35); }
    .yt { background-color: #FF0000; box-shadow: 0 6px 16px rgba(255, 0, 0, 0.35); }
    .wa { background-color: #25D366; box-shadow: 0 6px 16px rgba(37, 211, 102, 0.35); }
    
    .divider {
      width: 100%;
      border: none;
      border-top: 1px solid #e2e8f0;
      margin-bottom: 30px;
    }

    details {
      width: 100%;
    }
    summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 18px 20px;
      background-color: #EA4335;
      color: #ffffff;
      font-weight: 700;
      font-size: 1.05rem;
      border-radius: 14px;
      cursor: pointer;
      user-select: none;
      box-shadow: 0 6px 18px rgba(234, 67, 53, 0.3);
      list-style: none;
    }
    summary::-webkit-details-marker {
      display: none;
    }
    .store-list {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }
    .store-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      background-color: #ffffff;
      color: #222222;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.03);
    }
  </style>
</head>
<body>

  <div class="full-container">

    <!-- Brand Logo Icon -->
    <div class="brand-icon">
      <i class="fa-solid fa-palette"></i>
    </div>

    <!-- Brand Name & Subtitle -->
    <h1 class="brand-title">Shilpam Art & Craft</h1>
    <p class="brand-subtitle">Connect with us on Social Media & Visit Stores</p>

    <!-- Social Media Row -->
    <div class="social-row">
      <a href="https://www.instagram.com/shilpam_art_and_craft" target="_blank" rel="noopener noreferrer" class="social-btn insta" title="Instagram">
        <i class="fa-brands fa-instagram"></i>
      </a>
      <a href="https://www.youtube.com/@Shilpamartsandcrafts" target="_blank" rel="noopener noreferrer" class="social-btn yt" title="YouTube">
        <i class="fa-brands fa-youtube"></i>
      </a>
      <a href="https://wa.me/919274151527?text=Hello%20I%20want%20to%20know%20more" target="_blank" rel="noopener noreferrer" class="social-btn wa" title="WhatsApp">
        <i class="fa-brands fa-whatsapp"></i>
      </a>
    </div>

    <hr class="divider">

    <!-- Store Locations Section -->
    <details open>
      <summary>
        <span><i class="fa-solid fa-location-dot" style="margin-right: 10px;"></i> Our Store Locations</span>
        <i class="fa-solid fa-chevron-down" style="font-size: 0.9rem;"></i>
      </summary>

      <div class="store-list">
        <a href="https://www.google.com/maps/search/?api=1&query=Shilpam+Art+and+Craft+Adani+Shantigram+Ahmedabad" target="_blank" rel="noopener noreferrer" class="store-card">
           <span>📍 Adani Shantigram, Ahmedabad</span>
           <i class="fa-solid fa-arrow-up-right-from-square" style="font-size: 0.85rem; color: #888;"></i>
        </a>

        <a href="https://www.google.com/maps/search/?api=1&query=Shilpam+Art+and+Craft+Gota+Ahmedabad" target="_blank" rel="noopener noreferrer" class="store-card">
           <span>📍 Gota, Ahmedabad</span>
           <i class="fa-solid fa-arrow-up-right-from-square" style="font-size: 0.85rem; color: #888;"></i>
        </a>

        <a href="https://www.google.com/maps/search/?api=1&query=Shilpam+Art+and+Craft+Tankshal+Ahmedabad" target="_blank" rel="noopener noreferrer" class="store-card">
           <span>📍 Tankshal, Ahmedabad</span>
           <i class="fa-solid fa-arrow-up-right-from-square" style="font-size: 0.85rem; color: #888;"></i>
        </a>
      </div>
    </details>

  </div>

</body>
</html>
