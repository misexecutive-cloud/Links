<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#7A2048">
  <title>Shilpam Art & Craft</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Caveat:wght@600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root{
      --paper: #F7EFE1;
      --paper-card: #FCF7EC;
      --ink: #2E2419;
      --ink-soft: #6b5f52;
      --maroon: #7A2048;
      --maroon-deep: #55112F;
      --gold: #D99A2B;
      --gold-soft: #F1C877;
      --teal: #1F6F6F;
      --stitch: rgba(46,36,25,0.28);
    }

    *{ box-sizing: border-box; margin:0; padding:0; }

    html{ -webkit-tap-highlight-color: transparent; }

    body{
      min-height:100vh;
      font-family: 'Poppins', sans-serif;
      color: var(--ink);
      background-color: var(--paper);
      background-image:
        radial-gradient(circle at 1px 1px, rgba(122,32,72,0.06) 1px, transparent 1.6px);
      background-size: 18px 18px;
    }

    a{ color: inherit; }

    .page{
      max-width: 460px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 40px 20px 36px;
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    /* ---------- Logo badge ---------- */
    .logo-wrap{
      position: relative;
      width: 128px;
      height: 128px;
      margin-bottom: 18px;
    }
    .logo-ring{
      position:absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2px dashed var(--stitch);
      animation: spin 8s linear infinite;
    }
    @keyframes spin{ to{ transform: rotate(360deg); } }

    .logo-badge{
      width:100%;
      height:100%;
      border-radius:50%;
      background: var(--paper-card);
      border: 4px solid #fff;
      box-shadow: 0 10px 24px rgba(85,17,47,0.18);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      animation: floatBadge 3.2s ease-in-out infinite;
    }
    @keyframes floatBadge{
      0%, 100%{ transform: translateY(0px); box-shadow: 0 10px 24px rgba(85,17,47,0.18); }
      50%{ transform: translateY(-10px); box-shadow: 0 18px 26px rgba(85,17,47,0.12); }
    }
    @media (prefers-reduced-motion: reduce){
      .logo-badge, .logo-ring{ animation: none; }
    }
    .logo-badge img{
      width:100%;
      height:100%;
      object-fit: contain;
      transform: scale(1.5);
    }

    /* ---------- Header ---------- */
    .brand-block{
      text-align:center;
      margin-bottom: 26px;
    }
    .brand-title{
      font-family:'Fraunces', serif;
      font-weight: 700;
      font-size: clamp(1.5rem, 7vw, 2rem);
      color: var(--maroon-deep);
      letter-spacing: 0.2px;
      line-height: 1.15;
    }
    .brand-underline{
      display:block;
      width: 128px;
      height: 10px;
      margin: 8px auto 12px;
    }
    /* ---------- Social row ---------- */
    .social-row{
      display:flex;
      justify-content:center;
      gap: 20px;
      margin-bottom: 30px;
      overflow: visible;
    }
    .social-btn{
      position: relative;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size: 23px;
      color:#fff;
      text-decoration:none;
      box-shadow: 0 6px 14px rgba(46,36,25,0.16);
      transition: transform 0.2s ease;
      animation: glowPulse 2.6s ease-in-out infinite;
    }
    .btn-surface{
      position:absolute;
      inset: 0;
      border-radius: 50%;
      overflow: hidden;
      z-index: 0;
    }
    .social-btn:nth-child(2){ animation-delay: 0.35s; }
    .social-btn:nth-child(3){ animation-delay: 0.7s; }
    @keyframes glowPulse{
      0%, 100%{ box-shadow: 0 6px 14px rgba(46,36,25,0.16); }
      50%{ box-shadow: 0 10px 22px rgba(46,36,25,0.26), 0 0 0 7px rgba(233,169,53,0.14); }
    }
    .social-btn i{
      position: relative;
      z-index: 1;
      display:inline-block;
    }
    .social-btn i.icon-pop{
      animation: popBounce 0.55s ease;
    }
    @keyframes popBounce{
      0%{ transform: scale(1) rotate(0deg); }
      30%{ transform: scale(1.3) rotate(-10deg); }
      55%{ transform: scale(0.9) rotate(8deg); }
      80%{ transform: scale(1.08) rotate(-3deg); }
      100%{ transform: scale(1) rotate(0deg); }
    }
    .ripple{
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.55);
      transform: scale(0);
      pointer-events: none;
      animation: rippleAnim 0.6s ease-out forwards;
    }
    @keyframes rippleAnim{
      to{ transform: scale(2.8); opacity: 0; }
    }
    @media (prefers-reduced-motion: reduce){
      .social-btn{ animation: none; }
      .social-btn i.icon-pop{ animation: none; }
      .ripple{ display:none; }
    }
    .social-btn::after{
      content:"";
      position:absolute;
      inset: -6px;
      border-radius:50%;
      border: 2px dashed var(--stitch);
    }
    .social-btn:active{ transform: scale(0.94); }
    .insta{ background: radial-gradient(circle at 30% 110%, #ffdb73 0%, #fd5949 35%, #d6249f 62%, #285AEB 100%); }
    .yt{ background: #E62117; }
    .wa{ background: #25D366; }

    /* ---------- Stitched divider ---------- */
    .stitch-divider{
      width: 100%;
      height: 14px;
      margin-bottom: 26px;
      opacity: 0.9;
    }

    /* ---------- Section label ---------- */
    .section-label{
      align-self:flex-start;
      display:flex;
      align-items:center;
      gap:8px;
      font-family:'Fraunces', serif;
      font-weight: 600;
      font-size: 1.02rem;
      color: var(--maroon-deep);
      margin-bottom: 14px;
    }
    .section-label i{ color: var(--gold); }

    /* ---------- Store toggle ---------- */
    details{ width:100%; }
    summary{
      display:flex;
      align-items:center;
      justify-content:space-between;
      width:100%;
      padding: 15px 18px;
      background: var(--maroon);
      color:#fff;
      font-weight: 600;
      font-size: 0.98rem;
      border-radius: 14px;
      cursor:pointer;
      list-style:none;
      box-shadow: 0 8px 18px rgba(122,32,72,0.28);
      transition: border-radius 0.2s ease;
    }
    summary::-webkit-details-marker{ display:none; }
    summary .chev{ transition: transform 0.25s ease; font-size:0.8rem; }
    details[open] summary{ border-radius: 14px 14px 0 0; }
    details[open] summary .chev{ transform: rotate(180deg); }

    .store-list{
      display:flex;
      flex-direction:column;
      gap: 10px;
      padding: 14px 10px 4px;
      background: var(--gold-soft);
      border-radius: 0 0 14px 14px;
      margin-top: -2px;
    }

    .store-card{
      position: relative;
      display:flex;
      align-items:center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--paper-card);
      text-decoration:none;
      color: var(--ink);
      border-radius: 10px;
      border: 1.5px dashed var(--stitch);
      box-shadow: 0 3px 8px rgba(46,36,25,0.08);
      transition: transform 0.2s ease, background 0.2s ease;
    }
    .store-card:active{ transform: translateX(3px); background:#fff; }

    .pin-badge{
      flex-shrink:0;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--maroon);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size: 0.85rem;
    }
    .store-text{ flex: 1; }
    .store-name{ font-weight: 600; font-size: 0.95rem; }
    .store-city{ font-size: 0.78rem; color: var(--ink-soft); }
    .store-card i.fa-arrow-up-right-from-square{ font-size: 0.75rem; color: var(--ink-soft); }

    footer{
      margin-top: 34px;
      font-family: 'Caveat', cursive;
      font-size: 1.05rem;
      color: var(--ink-soft);
      text-align:center;
    }
  </style>
</head>
<body>

  <div class="page">

    <div class="logo-wrap">
      <div class="logo-ring"></div>
      <div class="logo-badge">
        <img src="logo.png" alt="Shilpam Art & Craft">
      </div>
    </div>

    <div class="brand-block">
      <h1 class="brand-title">Shilpam Art &amp; Craft</h1>
      <svg class="brand-underline" viewBox="0 0 128 10" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 6 C 20 -1, 40 12, 64 5 C 88 -2, 108 12, 126 5" fill="none" stroke="#D99A2B" stroke-width="3" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="social-row">
      <a href="https://www.instagram.com/shilpam_art_and_craft" target="_blank" rel="noopener noreferrer" class="social-btn insta" title="Instagram" aria-label="Instagram">
        <span class="btn-surface"></span>
        <i class="fa-brands fa-instagram"></i>
      </a>
      <a href="https://www.youtube.com/@Shilpamartsandcrafts" target="_blank" rel="noopener noreferrer" class="social-btn yt" title="YouTube" aria-label="YouTube">
        <span class="btn-surface"></span>
        <i class="fa-brands fa-youtube"></i>
      </a>
      <a href="https://wa.me/919274151527?text=Hello%20I%20want%20to%20know%20more" target="_blank" rel="noopener noreferrer" class="social-btn wa" title="WhatsApp" aria-label="WhatsApp">
        <span class="btn-surface"></span>
        <i class="fa-brands fa-whatsapp"></i>
      </a>
    </div>

    <svg class="stitch-divider" viewBox="0 0 400 14" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0 7 Q 25 0, 50 7 T 100 7 T 150 7 T 200 7 T 250 7 T 300 7 T 350 7 T 400 7"
            fill="none" stroke="#7A2048" stroke-width="2" stroke-dasharray="6 6" stroke-linecap="round" opacity="0.55"/>
    </svg>

    <details>
      <summary>
        <span><i class="fa-solid fa-location-dot" style="margin-right:8px;"></i>Visit our stores</span>
        <i class="fa-solid fa-chevron-down chev"></i>
      </summary>

      <div class="store-list">
        <a href="https://www.google.com/maps/search/?api=1&query=Shilpam+Art+and+Craft+Adani+Shantigram+Ahmedabad" target="_blank" rel="noopener noreferrer" class="store-card">
          <span class="pin-badge"><i class="fa-solid fa-location-dot"></i></span>
          <span class="store-text">
            <span class="store-name" style="display:block;">Adani Shantigram</span>
            <span class="store-city">Ahmedabad</span>
          </span>
          <i class="fa-solid fa-arrow-up-right-from-square"></i>
        </a>

        <a href="https://www.google.com/maps/search/?api=1&query=Shilpam+Art+and+Craft+Gota+Ahmedabad" target="_blank" rel="noopener noreferrer" class="store-card">
          <span class="pin-badge"><i class="fa-solid fa-location-dot"></i></span>
          <span class="store-text">
            <span class="store-name" style="display:block;">Gota</span>
            <span class="store-city">Ahmedabad</span>
          </span>
          <i class="fa-solid fa-arrow-up-right-from-square"></i>
        </a>

        <a href="https://www.google.com/maps/search/?api=1&query=Shilpam+Art+and+Craft+Tankshal+Ahmedabad" target="_blank" rel="noopener noreferrer" class="store-card">
          <span class="pin-badge"><i class="fa-solid fa-location-dot"></i></span>
          <span class="store-text">
            <span class="store-name" style="display:block;">Tankshal</span>
            <span class="store-city">Ahmedabad</span>
          </span>
          <i class="fa-solid fa-arrow-up-right-from-square"></i>
        </a>
      </div>
    </details>

    <footer>thank you for stopping by ✂️</footer>

  </div>

  <script>
    document.querySelectorAll('.social-btn').forEach(function(btn){
      btn.addEventListener('click', function(e){
        var surface = btn.querySelector('.btn-surface');
        var icon = btn.querySelector('i');
        var rect = btn.getBoundingClientRect();
        var size = Math.max(rect.width, rect.height);
        var x = (e.clientX || rect.left + rect.width/2) - rect.left - size/2;
        var y = (e.clientY || rect.top + rect.height/2) - rect.top - size/2;

        var ripple = document.createElement('span');
        ripple.className = 'ripple';
        ripple.style.width = size + 'px';
        ripple.style.height = size + 'px';
        ripple.style.left = x + 'px';
        ripple.style.top = y + 'px';
        surface.appendChild(ripple);
        ripple.addEventListener('animationend', function(){ ripple.remove(); });

        icon.classList.remove('icon-pop');
        void icon.offsetWidth; /* restart animation */
        icon.classList.add('icon-pop');
      });
    });
  </script>
</body>
</html>
